apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mealie-data
  namespace: mealie
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
  annotations:
    checkov.io/skip1: "CKV_K8S_40=mealie image runs as UID 911 by design"
    checkov.io/skip2: "CKV_K8S_35=env vars required for database and application config"
    checkov.io/skip3: "CKV_K8S_22=mealie writes to mounted data volume and may use rootFS temp dirs"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mealie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mealie
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 911
        fsGroup: 911
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.13.1
          ports:
            - containerPort: 9000
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "911"
            - name: PGID
              value: "911"
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: url
            - name: ALLOW_SIGNUP
              value: "false"
            - name: ALLOW_PASSWORD_LOGIN
              value: "true"
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_SERVER
              value: postgresql-rw.postgresql.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: mealie
            - name: POSTGRES_USER
              value: mealie
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: db_password
            - name: DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: username
            - name: DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: openai_api_key
            - name: DEFAULT_GROUP
              value: Homelab
            - name: DEFAULT_HOUSEHOLD
              value: Home
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: mealie-data
              mountPath: /app/data
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data
---
apiVersion: v1
kind: Service
metadata:
  name: mealie
  namespace: mealie
spec:
  selector:
    app.kubernetes.io/name: mealie
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: mealie
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: mealie.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie
                port:
                  number: 9000
  tls:
    - secretName: mealie-tls
      hosts:
        - mealie.example.com
