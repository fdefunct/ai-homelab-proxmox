---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  annotations:
    reloader.stakater.com/auto: "true"
    checkov.io/skip1: "CKV_K8S_38=homepage requires SA token for Kubernetes cluster info widget"
    checkov.io/skip2: "CKV_K8S_35=many env vars required for homepage widget integrations"
    checkov.io/skip3: "CKV_K8S_40=homepage image runs as UID 1000 by design"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - cp /config-src/* /app/config/ && mkdir -p /app/config/logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: config-dir
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: core.example.com
            - name: HOMEPAGE_VAR_ARGOCD_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-argocd-token
                  key: argocd-key
            - name: HOMEPAGE_VAR_PROXMOX_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-proxmox-token
                  key: username
            - name: HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: homepage-proxmox-token
                  key: token-secret
            - name: HOMEPAGE_VAR_PBS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-pbs-token
                  key: username
            - name: HOMEPAGE_VAR_PBS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: homepage-pbs-token
                  key: token-secret
            - name: HOMEPAGE_VAR_TAILSCALE_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-tailscale-token
                  key: key
            - name: HOMEPAGE_VAR_TAILSCALE_DEVICE_ID
              valueFrom:
                secretKeyRef:
                  name: homepage-tailscale-token
                  key: device-id
            - name: HOMEPAGE_VAR_HOME_ASSISTANT_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-home-assistant-token
                  key: key
            - name: HOMEPAGE_VAR_MEALIE_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-mealie-token
                  key: key
            - name: HOMEPAGE_VAR_NAS_A_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-nas-a-token
                  key: username
            - name: HOMEPAGE_VAR_NAS_A_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homepage-nas-a-token
                  key: password
            - name: HOMEPAGE_VAR_NAS_B_USERNAME
              valueFrom:
                secretKeyRef:
                  name: homepage-nas-b-token
                  key: username
            - name: HOMEPAGE_VAR_NAS_B_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homepage-nas-b-token
                  key: password
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: config-dir
              mountPath: /app/config
            - name: homepage-assets
              mountPath: /app/public/icons
              readOnly: true
            - name: homepage-assets
              mountPath: /app/public/backgrounds
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-src
          configMap:
            name: homepage-config
        - name: config-dir
          emptyDir: {}
        - name: homepage-assets
          configMap:
            name: homepage-assets
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
spec:
  selector:
    app.kubernetes.io/name: homepage
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - core.example.com
      secretName: homepage-tls
  rules:
    - host: core.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homepage-tls
  namespace: homepage
spec:
  secretName: homepage-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - core.example.com
