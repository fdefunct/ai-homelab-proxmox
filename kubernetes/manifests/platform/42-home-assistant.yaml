apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "40"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: home-assistant-strip-forwarded
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-For: ""
      X-Real-Ip: ""
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-external
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  type: ExternalName
  externalName: 192.0.2.51.sslip.io
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "42"
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    traefik.ingress.kubernetes.io/router.middlewares: home-assistant-home-assistant-strip-forwarded@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ha.example.com
      secretName: home-assistant-tls
  rules:
    - host: ha.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant-external
                port:
                  number: 80
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-assistant-tls
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  secretName: home-assistant-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - ha.example.com
