deployment:
  replicas: 2

service:
  type: LoadBalancer

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesIngress:
    allowExternalNameServices: true
    publishedService:
      enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
