- name: Check whether k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_binary

- name: Download k3s installer
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/get-k3s.sh
    mode: "0755"
  when: not k3s_agent_binary.stat.exists

- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: "{{ k3s_agent_config_dir }}"
    state: directory
    mode: "0755"

- name: Render k3s agent config
  ansible.builtin.copy:
    dest: "{{ k3s_agent_config_path }}"
    mode: "0600"
    content: |
      server: {{ ('https://' ~ k3s_server_address ~ ':6443') | to_json }}
      token: {{ k3s_cluster_token | to_json }}
      node-name: {{ inventory_hostname }}
      node-ip: {{ ansible_host }}
      kubelet-arg:
        - {{ ('resolv-conf=' ~ k3s_agent_resolv_conf_path) | to_json }}
  notify: Restart k3s agent

- name: Install k3s agent
  ansible.builtin.command:
    cmd: /tmp/get-k3s.sh
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_CHANNEL: "{{ k3s_channel }}"
    INSTALL_K3S_EXEC: "agent"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"

- name: Ensure k3s-agent service is enabled
  ansible.builtin.service:
    name: k3s-agent
    enabled: true
    state: started

- name: Flush k3s agent handlers
  ansible.builtin.meta: flush_handlers
