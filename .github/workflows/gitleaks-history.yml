# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Gitleaks History

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: read

jobs:
  gitleaks-history:
    runs-on: ubuntu-latest
    steps:
      # v6
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Load shared tool versions
        run: cat ./tool-versions.env >> "$GITHUB_ENV"

      - name: Install gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          ./scripts/download-github-release-asset \
            gitleaks/gitleaks \
            "${{ env.GITLEAKS_VERSION }}" \
            "gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz" \
            "gitleaks_${{ env.GITLEAKS_VERSION }}_checksums.txt" \
            "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Gitleaks history scan
        run: GITLEAKS_BIN=gitleaks make gitleaks-history-validate
